# Commit-Gotchi — initial Docker infrastructure.
#
# Services: Vue SPA, Spring Boot (System of Record), FastAPI (Intelligence),
# and a single shared PostgreSQL instance with one database per backend.
#
# NOTE: The public Nginx reverse proxy + Certbot/HTTPS layer is intentionally
# NOT here — it is added on the server instance after provisioning. Locally,
# each service is reachable directly on its mapped port.

services:
  postgres:
    image: postgres:16-alpine
    container_name: commitgotchi-postgres
    restart: unless-stopped
    environment:
      # POSTGRES_DB creates the Spring Boot (SoR) database automatically.
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${SPRING_DB_NAME}
      # Consumed by the init script to create the separate FastAPI database.
      FASTAPI_DB_NAME: ${FASTAPI_DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Init scripts run once, only when the data volume is empty.
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${SPRING_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - commitgotchi-net

  springboot:
    build:
      context: ./springboot
    container_name: commitgotchi-springboot
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DB_NAME: ${SPRING_DB_NAME}
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64:?JWT_SECRET_BASE64 is required}
      JWT_ISSUER: ${JWT_ISSUER:-commitgotchi-springboot}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      SPRING_INTERNAL_API_SECRET: ${SPRING_INTERNAL_API_SECRET:?SPRING_INTERNAL_API_SECRET is required}
      CHARACTER_IMAGE_ENABLED: ${CHARACTER_IMAGE_ENABLED:-true}
      CHARACTER_IMAGE_BASE_URL: ${CHARACTER_IMAGE_BASE_URL:-http://fastapi:8000}
      CHARACTER_IMAGE_FALLBACK_SPRITE_SHEET_URL: ${CHARACTER_IMAGE_FALLBACK_SPRITE_SHEET_URL:-/character-assets/default_image1.png}
      QUIZ_GRADING_ENABLED: ${QUIZ_GRADING_ENABLED:-false}
      QUIZ_GRADING_BASE_URL: ${QUIZ_GRADING_BASE_URL:-http://fastapi:8000}
      QUIZ_GRADING_CALLBACK_URL: ${QUIZ_GRADING_CALLBACK_URL:-http://springboot:8080/api/internal/quizzes/grade-result}
      REPORT_MIDNIGHT_SCHEDULER_ENABLED: ${REPORT_MIDNIGHT_SCHEDULER_ENABLED:-true}
      REPORT_REQUEST_QUEUE_ENABLED: ${REPORT_REQUEST_QUEUE_ENABLED:-false}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_SQS_ENDPOINT: ${AWS_SQS_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      REPORT_REQUEST_QUEUE_ACCESS_KEY_ID: ${REPORT_REQUEST_QUEUE_ACCESS_KEY_ID:-}
      REPORT_REQUEST_QUEUE_SECRET_ACCESS_KEY: ${REPORT_REQUEST_QUEUE_SECRET_ACCESS_KEY:-}
      REPORT_REQUEST_QUEUE_SESSION_TOKEN: ${REPORT_REQUEST_QUEUE_SESSION_TOKEN:-}
      REPORT_REQUEST_QUEUE_NAME: ${REPORT_REQUEST_QUEUE_NAME:-}
      REPORT_REQUEST_QUEUE_URL: ${REPORT_REQUEST_QUEUE_URL:-}
      REPORT_REQUEST_DISPATCHER_ENABLED: ${REPORT_REQUEST_DISPATCHER_ENABLED:-false}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_OBJECT_PREFIX: ${S3_OBJECT_PREFIX:-}
      # INFRA-5 read-side: persist s3:// key + mint presigned GET at read time.
      CHARACTER_IMAGE_S3_PRESIGNED_GET_ENABLED: ${CHARACTER_IMAGE_S3_PRESIGNED_GET_ENABLED:-false}
      # s3://bucket/prefix Spring writes to / presigns from (e.g. .../dev).
      CHARACTER_IMAGE_S3_OBJECT_PREFIX: ${CHARACTER_IMAGE_S3_OBJECT_PREFIX:-}
      # presign credentials via the mounted AWS profile (no static keys).
      AWS_PROFILE: ${AWS_PROFILE:-}
      AWS_CONFIG_FILE: /aws/config
      AWS_SHARED_CREDENTIALS_FILE: /aws/credentials
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
    ports:
      - "${SPRING_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - commitgotchi-net
    volumes:
      # Host AWS profile, read-only. Used only when S3/presign is enabled.
      - ${HOME}/.aws:/aws:ro

  fastapi:
    image: commitgotchi-fastapi:local
    build:
      context: ./fastapi
    container_name: commitgotchi-fastapi
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      FASTAPI_DB_NAME: ${FASTAPI_DB_NAME}
      SPRING_BOOT_INTERNAL_BASE_URL: ${SPRING_BOOT_INTERNAL_BASE_URL:-http://springboot:8080}
      SPRING_INTERNAL_API_SECRET: ${SPRING_INTERNAL_API_SECRET:?SPRING_INTERNAL_API_SECRET is required}
      SPRING_REPORT_CALLBACK_PATH: ${SPRING_REPORT_CALLBACK_PATH:-/api/report}
      SPRING_QUIZ_GRADE_RESULT_PATH: ${SPRING_QUIZ_GRADE_RESULT_PATH:-/api/internal/quizzes/grade-result}
      SPRING_CALLBACK_TIMEOUT_SECONDS: ${SPRING_CALLBACK_TIMEOUT_SECONDS:-10}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_QUIZ_GRADER_MODEL: ${GEMINI_QUIZ_GRADER_MODEL:-gemini-3.1-flash-lite}
      GEMINI_REPORT_ANALYZER_MODEL: ${GEMINI_REPORT_ANALYZER_MODEL:-gemini-3.1-flash-lite}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-2}
      GEMINI_EMBEDDING_DIMENSIONS: ${GEMINI_EMBEDDING_DIMENSIONS:-768}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-gemini-2.5-flash-image}
      GEMINI_IMAGE_TIMEOUT_SECONDS: ${GEMINI_IMAGE_TIMEOUT_SECONDS:-30}
      GEMINI_IMAGE_RETRY_LIMIT: ${GEMINI_IMAGE_RETRY_LIMIT:-1}
      CHARACTER_IMAGE_STORAGE_ROOT: ${CHARACTER_IMAGE_STORAGE_ROOT:-runtime/data/character-images}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_SQS_ENDPOINT: ${AWS_SQS_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      REPORT_REQUEST_QUEUE_URL: ${REPORT_REQUEST_QUEUE_URL:-}
      REPORT_REQUEST_DLQ_URL: ${REPORT_REQUEST_DLQ_URL:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_OBJECT_PREFIX: ${S3_OBJECT_PREFIX:-}
      # INFRA-5 write-side: local (default) or s3 upload to Spring's s3ObjectUrl.
      CHARACTER_IMAGE_STORAGE_BACKEND: ${CHARACTER_IMAGE_STORAGE_BACKEND:-local}
      # S3 upload credentials via the mounted AWS profile (no static keys).
      AWS_PROFILE: ${AWS_PROFILE:-}
      AWS_CONFIG_FILE: /aws/config
      AWS_SHARED_CREDENTIALS_FILE: /aws/credentials
    ports:
      - "${FASTAPI_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - commitgotchi-net
    volumes:
      - ${HOME}/.aws:/aws:ro

  fastapi-report-worker:
    profiles: ["worker"]
    image: commitgotchi-fastapi:local
    build:
      context: ./fastapi
    container_name: commitgotchi-fastapi-report-worker
    restart: unless-stopped
    command: ["python", "-m", "app.integration.report_worker"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      FASTAPI_DB_NAME: ${FASTAPI_DB_NAME}
      SPRING_BOOT_INTERNAL_BASE_URL: ${SPRING_BOOT_INTERNAL_BASE_URL:-http://springboot:8080}
      SPRING_INTERNAL_API_SECRET: ${SPRING_INTERNAL_API_SECRET:?SPRING_INTERNAL_API_SECRET is required}
      SPRING_REPORT_CALLBACK_PATH: ${SPRING_REPORT_CALLBACK_PATH:-/api/report}
      SPRING_CALLBACK_TIMEOUT_SECONDS: ${SPRING_CALLBACK_TIMEOUT_SECONDS:-10}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_REPORT_ANALYZER_MODEL: ${GEMINI_REPORT_ANALYZER_MODEL:-gemini-3.1-flash-lite}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-2}
      GEMINI_EMBEDDING_DIMENSIONS: ${GEMINI_EMBEDDING_DIMENSIONS:-768}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_SQS_ENDPOINT: ${AWS_SQS_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      REPORT_REQUEST_QUEUE_URL: ${REPORT_REQUEST_QUEUE_URL:-}
      REPORT_REQUEST_DLQ_URL: ${REPORT_REQUEST_DLQ_URL:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_OBJECT_PREFIX: ${S3_OBJECT_PREFIX:-}
      # SQS consume credentials via the mounted AWS profile (no static keys).
      AWS_PROFILE: ${AWS_PROFILE:-}
      AWS_CONFIG_FILE: /aws/config
      AWS_SHARED_CREDENTIALS_FILE: /aws/credentials
    depends_on:
      postgres:
        condition: service_healthy
      springboot:
        condition: service_started
    networks:
      - commitgotchi-net
    healthcheck:
      disable: true
    volumes:
      - ${HOME}/.aws:/aws:ro

  vue:
    build:
      context: ./vue
      args:
        # Browser calls the Spring Boot host port. Override per environment.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: commitgotchi-vue
    restart: unless-stopped
    ports:
      - "${VUE_PORT}:80"
    depends_on:
      - springboot
    networks:
      - commitgotchi-net

volumes:
  postgres-data:

networks:
  commitgotchi-net:
    driver: bridge
