spring:
  application:
    name: commitgotchi-springboot
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  datasource:
    # All DB connection values come from the environment (see .env.example).
    # Spring Boot (System of Record) owns its own database, separate from FastAPI.
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${SPRING_DB_NAME:commitgotchi}
    username: ${DB_USER:commitgotchi}
    password: ${DB_PASSWORD:commitgotchi}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true

mybatis:
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

commitgotchi:
  internal-api:
    secret: ${SPRING_INTERNAL_API_SECRET:}
  report:
    scheduler:
      enabled: ${REPORT_MIDNIGHT_SCHEDULER_ENABLED:true}
      midnight-cron: ${REPORT_MIDNIGHT_SCHEDULER_CRON:0 0 0 * * *}
      zone: ${REPORT_MIDNIGHT_SCHEDULER_ZONE:Asia/Seoul}
    queue:
      enabled: ${REPORT_REQUEST_QUEUE_ENABLED:false}
      region: ${AWS_REGION:ap-northeast-2}
      endpoint-url: ${AWS_SQS_ENDPOINT:}
      access-key-id: ${REPORT_REQUEST_QUEUE_ACCESS_KEY_ID:}
      secret-access-key: ${REPORT_REQUEST_QUEUE_SECRET_ACCESS_KEY:}
      session-token: ${REPORT_REQUEST_QUEUE_SESSION_TOKEN:}
      request-queue-name: ${REPORT_REQUEST_QUEUE_NAME:}
      request-queue-url: ${REPORT_REQUEST_QUEUE_URL:}
    dispatcher:
      enabled: ${REPORT_REQUEST_DISPATCHER_ENABLED:${REPORT_REQUEST_QUEUE_ENABLED:false}}
      batch-size: ${REPORT_REQUEST_DISPATCHER_BATCH_SIZE:20}
      max-attempts: ${REPORT_REQUEST_DISPATCHER_MAX_ATTEMPTS:3}
      retry-delay: ${REPORT_REQUEST_DISPATCHER_RETRY_DELAY:PT5M}
      fixed-delay-ms: ${REPORT_REQUEST_DISPATCHER_FIXED_DELAY_MS:30000}
  quiz:
    grading:
      enabled: ${QUIZ_GRADING_ENABLED:false}
      base-url: ${QUIZ_GRADING_BASE_URL:}
      callback-url: ${QUIZ_GRADING_CALLBACK_URL:http://localhost:8080/api/internal/quizzes/grade-result}
      connect-timeout: ${QUIZ_GRADING_CONNECT_TIMEOUT:PT2S}
      read-timeout: ${QUIZ_GRADING_READ_TIMEOUT:PT5S}
  auth:
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:false}
  character:
    image:
      enabled: ${CHARACTER_IMAGE_ENABLED:false}
      base-url: ${CHARACTER_IMAGE_BASE_URL:}
      fallback-sprite-sheet-url: ${CHARACTER_IMAGE_FALLBACK_SPRITE_SHEET_URL:/character-assets/default_image1.png}
      s3-object-prefix: ${CHARACTER_IMAGE_S3_OBJECT_PREFIX:s3://commitgotchi-character-images/sprites}
      s3-presigned-url-enabled: ${CHARACTER_IMAGE_S3_PRESIGNED_URL_ENABLED:false}
      s3-region: ${CHARACTER_IMAGE_S3_REGION:${AWS_REGION:ap-northeast-2}}
      s3-access-key-id: ${CHARACTER_IMAGE_S3_ACCESS_KEY_ID:${AWS_ACCESS_KEY_ID:}}
      s3-secret-access-key: ${CHARACTER_IMAGE_S3_SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY:}}
      s3-session-token: ${CHARACTER_IMAGE_S3_SESSION_TOKEN:${AWS_SESSION_TOKEN:}}
      s3-endpoint-url: ${CHARACTER_IMAGE_S3_ENDPOINT_URL:}
      s3-presigned-url-ttl: ${CHARACTER_IMAGE_S3_PRESIGNED_URL_TTL:PT10M}
      connect-timeout: ${CHARACTER_IMAGE_CONNECT_TIMEOUT:PT2S}
      read-timeout: ${CHARACTER_IMAGE_READ_TIMEOUT:PT5S}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  jwt:
    secret-base64: ${JWT_SECRET_BASE64}
    issuer: ${JWT_ISSUER:commitgotchi-springboot}
    access-token-ttl: PT15M

---
spring:
  config:
    activate:
      on-profile: "prod"
commitgotchi:
  auth:
    refresh-cookie-secure: true

---
spring:
  config:
    activate:
      on-profile: "!prod & (local | dev | test)"
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
