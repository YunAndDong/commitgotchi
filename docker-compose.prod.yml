# Commit-Gotchi production/API-only compose.
#
# Standalone file: do not merge with docker-compose.yml. Vue is intentionally
# absent because production clients are Chrome extension builds, not a served SPA.

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: commitgotchi-nginx-prod
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/api-only.conf:/etc/nginx/conf.d/default.conf:ro
      - ${NGINX_LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - ${NGINX_CERTBOT_WEBROOT:-/var/www/certbot}:/var/www/certbot:ro
    depends_on:
      springboot:
        condition: service_started
    networks:
      - commitgotchi-net

  postgres:
    image: postgres:16-alpine
    container_name: commitgotchi-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${SPRING_DB_NAME}
      FASTAPI_DB_NAME: ${FASTAPI_DB_NAME}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${SPRING_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - commitgotchi-net

  springboot:
    image: ${SPRINGBOOT_IMAGE:-commitgotchi-springboot:prod}
    container_name: commitgotchi-springboot-prod
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DB_NAME: ${SPRING_DB_NAME}
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64:?JWT_SECRET_BASE64 is required}
      JWT_ISSUER: ${JWT_ISSUER:-commitgotchi-springboot}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-true}
      SPRING_INTERNAL_API_SECRET: ${SPRING_INTERNAL_API_SECRET:?SPRING_INTERNAL_API_SECRET is required}
      CHARACTER_IMAGE_ENABLED: ${CHARACTER_IMAGE_ENABLED:-true}
      CHARACTER_IMAGE_BASE_URL: ${CHARACTER_IMAGE_BASE_URL:-http://fastapi:8000}
      CHARACTER_IMAGE_FALLBACK_SPRITE_SHEET_URL: ${CHARACTER_IMAGE_FALLBACK_SPRITE_SHEET_URL:-/character-assets/default_image1.png}
      QUIZ_GRADING_ENABLED: ${QUIZ_GRADING_ENABLED:-false}
      QUIZ_GRADING_BASE_URL: ${QUIZ_GRADING_BASE_URL:-http://fastapi:8000}
      QUIZ_GRADING_CALLBACK_URL: ${QUIZ_GRADING_CALLBACK_URL:-http://springboot:8080/api/internal/quizzes/grade-result}
      REPORT_MIDNIGHT_SCHEDULER_ENABLED: ${REPORT_MIDNIGHT_SCHEDULER_ENABLED:-true}
      REPORT_REQUEST_QUEUE_ENABLED: ${REPORT_REQUEST_QUEUE_ENABLED:-false}
      REPORT_REQUEST_DISPATCHER_ENABLED: ${REPORT_REQUEST_DISPATCHER_ENABLED:-false}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_SQS_ENDPOINT: ${AWS_SQS_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      REPORT_REQUEST_QUEUE_ACCESS_KEY_ID: ${REPORT_REQUEST_QUEUE_ACCESS_KEY_ID:-}
      REPORT_REQUEST_QUEUE_SECRET_ACCESS_KEY: ${REPORT_REQUEST_QUEUE_SECRET_ACCESS_KEY:-}
      REPORT_REQUEST_QUEUE_SESSION_TOKEN: ${REPORT_REQUEST_QUEUE_SESSION_TOKEN:-}
      REPORT_REQUEST_QUEUE_NAME: ${REPORT_REQUEST_QUEUE_NAME:-}
      REPORT_REQUEST_QUEUE_URL: ${REPORT_REQUEST_QUEUE_URL:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_OBJECT_PREFIX: ${S3_OBJECT_PREFIX:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - commitgotchi-net

  fastapi:
    image: ${FASTAPI_IMAGE:-commitgotchi-fastapi:prod}
    container_name: commitgotchi-fastapi-prod
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      FASTAPI_DB_NAME: ${FASTAPI_DB_NAME}
      SPRING_BOOT_INTERNAL_BASE_URL: ${SPRING_BOOT_INTERNAL_BASE_URL:-http://springboot:8080}
      SPRING_INTERNAL_API_SECRET: ${SPRING_INTERNAL_API_SECRET:?SPRING_INTERNAL_API_SECRET is required}
      SPRING_REPORT_CALLBACK_PATH: ${SPRING_REPORT_CALLBACK_PATH:-/api/report}
      SPRING_QUIZ_GRADE_RESULT_PATH: ${SPRING_QUIZ_GRADE_RESULT_PATH:-/api/internal/quizzes/grade-result}
      SPRING_CALLBACK_TIMEOUT_SECONDS: ${SPRING_CALLBACK_TIMEOUT_SECONDS:-10}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_QUIZ_GRADER_MODEL: ${GEMINI_QUIZ_GRADER_MODEL:-gemini-3.1-flash-lite}
      GEMINI_REPORT_ANALYZER_MODEL: ${GEMINI_REPORT_ANALYZER_MODEL:-gemini-3.1-flash-lite}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-2}
      GEMINI_EMBEDDING_DIMENSIONS: ${GEMINI_EMBEDDING_DIMENSIONS:-768}
      GEMINI_IMAGE_MODEL: ${GEMINI_IMAGE_MODEL:-gemini-2.5-flash-image}
      GEMINI_IMAGE_TIMEOUT_SECONDS: ${GEMINI_IMAGE_TIMEOUT_SECONDS:-30}
      GEMINI_IMAGE_RETRY_LIMIT: ${GEMINI_IMAGE_RETRY_LIMIT:-1}
      CHARACTER_IMAGE_STORAGE_ROOT: ${CHARACTER_IMAGE_STORAGE_ROOT:-runtime/data/character-images}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_SQS_ENDPOINT: ${AWS_SQS_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      REPORT_REQUEST_QUEUE_URL: ${REPORT_REQUEST_QUEUE_URL:-}
      REPORT_REQUEST_DLQ_URL: ${REPORT_REQUEST_DLQ_URL:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_OBJECT_PREFIX: ${S3_OBJECT_PREFIX:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - commitgotchi-net

  fastapi-report-worker:
    profiles: ["worker"]
    image: ${FASTAPI_IMAGE:-commitgotchi-fastapi:prod}
    container_name: commitgotchi-fastapi-report-worker-prod
    restart: unless-stopped
    command: ["python", "-m", "app.integration.report_worker"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      FASTAPI_DB_NAME: ${FASTAPI_DB_NAME}
      SPRING_BOOT_INTERNAL_BASE_URL: ${SPRING_BOOT_INTERNAL_BASE_URL:-http://springboot:8080}
      SPRING_INTERNAL_API_SECRET: ${SPRING_INTERNAL_API_SECRET:?SPRING_INTERNAL_API_SECRET is required}
      SPRING_REPORT_CALLBACK_PATH: ${SPRING_REPORT_CALLBACK_PATH:-/api/report}
      SPRING_CALLBACK_TIMEOUT_SECONDS: ${SPRING_CALLBACK_TIMEOUT_SECONDS:-10}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_REPORT_ANALYZER_MODEL: ${GEMINI_REPORT_ANALYZER_MODEL:-gemini-3.1-flash-lite}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-2}
      GEMINI_EMBEDDING_DIMENSIONS: ${GEMINI_EMBEDDING_DIMENSIONS:-768}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_SQS_ENDPOINT: ${AWS_SQS_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      REPORT_REQUEST_QUEUE_URL: ${REPORT_REQUEST_QUEUE_URL:-}
      REPORT_REQUEST_DLQ_URL: ${REPORT_REQUEST_DLQ_URL:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_OBJECT_PREFIX: ${S3_OBJECT_PREFIX:-}
    depends_on:
      postgres:
        condition: service_healthy
      springboot:
        condition: service_started
    networks:
      - commitgotchi-net
    healthcheck:
      disable: true

volumes:
  postgres-prod-data:

networks:
  commitgotchi-net:
    driver: bridge
