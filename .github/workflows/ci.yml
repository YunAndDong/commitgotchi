name: Backend CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  springboot-test:
    name: Spring Boot tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            springboot/*.gradle
            springboot/gradle/wrapper/gradle-wrapper.properties

      - name: Run tests
        working-directory: springboot
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          chmod +x ./gradlew
          ./gradlew test --no-daemon

  fastapi-test:
    name: FastAPI tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: fastapi/requirements.txt

      - name: Install dependencies
        working-directory: fastapi
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Run tests
        working-directory: fastapi
        run: python -m pytest

  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs:
      - springboot-test
      - fastapi-test
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: springboot
            context: ./springboot
            dockerfile: ./springboot/Dockerfile
            image: commitgotchi-springboot
          - name: fastapi
            context: ./fastapi
            dockerfile: ./fastapi/Dockerfile
            image: commitgotchi-fastapi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image without pushing
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: ${{ matrix.service.image }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
