# Container-internal static server for the built SPA.
# NOTE: this is NOT the public reverse proxy / TLS terminator — that Nginx +
# Certbot layer is added on the server instance later. This block only serves
# the compiled Vue assets and handles SPA history fallback.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
